# Flutter Dev Assistant - Recommended pubspec.yaml Template
# Production-ready Flutter application with modern best practices

name: my_flutter_app
description: A production-ready Flutter application following best practices
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # STATE MANAGEMENT (Choose one)
  # Option 1: Riverpod (Recommended)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Option 2: Bloc
  # flutter_bloc: ^9.1.0
  # bloc: ^9.1.0
  
  # CODE GENERATION (Essential)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # NETWORKING
  dio: ^5.9.2
  retrofit: ^4.5.0
  pretty_dio_logger: ^1.4.0  # Development logging
  
  # STORAGE
  flutter_secure_storage: ^9.2.2  # For tokens/sensitive data
  hive_flutter: ^1.1.0  # Local database
  shared_preferences: ^2.2.3  # Simple key-value storage
  
  # UI COMPONENTS
  cached_network_image: ^3.2.3
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  
  # NAVIGATION
  go_router: ^14.2.3
  
  # FUNCTIONAL PROGRAMMING
  dartz: ^0.10.1  # Either type for error handling
  
  # UTILITIES
  equatable: ^2.0.8  # Value equality
  intl: ^0.18.1  # Internationalization
  uuid: ^4.5.3  # UUID generation
  logger: ^2.6.2  # Logging
  
  # FORMS & VALIDATION
  flutter_form_builder: ^9.2.1
  form_builder_validators: ^9.1.0
  
  # PERMISSIONS
  permission_handler: ^11.3.1
  
  # DEVICE INFO
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1
  
  # CONNECTIVITY
  connectivity_plus: ^6.0.3
  
  # ERROR TRACKING & ANALYTICS
  sentry_flutter: ^8.11.0
  # firebase_analytics: ^10.8.0
  # firebase_crashlytics: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # CODE GENERATION
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0  # If using Riverpod
  retrofit_generator: ^8.2.1
  hive_generator: ^2.0.1
  
  # TESTING
  mocktail: ^1.0.4
  bloc_test: ^9.1.0  # If using Bloc
  integration_test:
    sdk: flutter
  
  # LINTING
  flutter_lints: ^4.0.0
  # custom_lint: ^0.6.7  # Optional - requires compatible versions
  # riverpod_lint: ^2.6.2  # Optional - if using Riverpod
  
  # ICONS (Optional - uncomment if needed)
  # flutter_launcher_icons: ^0.13.1
  
  # SPLASH SCREEN (Optional - uncomment if needed)
  # flutter_native_splash: ^2.3.11

# FLUTTER CONFIGURATION
flutter:
  uses-material-design: true
  
  # ASSETS
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    # - assets/translations/  # If using i18n
  
  # FONTS
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

# FLUTTER LAUNCHER ICONS CONFIGURATION
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

# FLUTTER NATIVE SPLASH CONFIGURATION
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: false
  
  android_12:
    image: assets/images/splash_logo_android12.png
    color: "#FFFFFF"

# NOTES:
# 1. Run 'flutter pub get' after modifying dependencies
# 2. Run 'flutter pub run build_runner build --delete-conflicting-outputs' for code generation
# 3. Run 'flutter pub run flutter_launcher_icons' to generate app icons
# 4. Run 'flutter pub run flutter_native_splash:create' to generate splash screens
# 5. Keep dependencies updated monthly: 'flutter pub outdated'
