name: Marketplace Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to Claude Code Marketplace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Extract version from tag
        id: get_version
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Validate marketplace metadata
        working-directory: ./plugins/claude-code
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          echo "Validating marketplace.json..."

          if [ ! -f ".claude-plugin/marketplace.json" ]; then
            echo "❌ marketplace.json not found"
            exit 1
          fi

          jq empty .claude-plugin/marketplace.json || {
            echo "❌ marketplace.json is invalid JSON"
            exit 1
          }

          PLUGIN_NAME=$(jq -r '.name' .claude-plugin/marketplace.json)
          MARKETPLACE_VERSION=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          OWNER=$(jq -r '.owner.name' .claude-plugin/marketplace.json)

          if [ -z "$PLUGIN_NAME" ] || [ "$PLUGIN_NAME" = "null" ]; then
            echo "❌ Plugin name is missing"
            exit 1
          fi

          if [ -z "$OWNER" ] || [ "$OWNER" = "null" ]; then
            echo "❌ Owner name is missing"
            exit 1
          fi

          if [ "$MARKETPLACE_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch: marketplace.json has $MARKETPLACE_VERSION but tag is $VERSION"
            exit 1
          fi

          echo "✅ marketplace.json is valid"
          echo "   Plugin: $PLUGIN_NAME"
          echo "   Owner: $OWNER"
          echo "   Version: $VERSION"

      - name: Prepare marketplace package
        id: prepare
        working-directory: ./plugins/claude-code
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          PACKAGE_NAME="flutter-dev-assistant-${VERSION}.tar.gz"
          PACKAGE_PATH="/tmp/${PACKAGE_NAME}"

          tar -czf "$PACKAGE_PATH" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.DS_Store' \
            .

          echo "package_name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "package_path=${PACKAGE_PATH}" >> $GITHUB_OUTPUT
          echo "✅ Created package: ${PACKAGE_NAME}"
          ls -lh "$PACKAGE_PATH"

      - name: Register with marketplace
        env:
          MARKETPLACE_API_TOKEN: ${{ secrets.MARKETPLACE_API_TOKEN }}
          PLUGIN_VERSION: ${{ steps.get_version.outputs.VERSION }}
          MARKETPLACE_URL: https://marketplace.api.claude.ai/v1
        run: |
          if [ -z "$MARKETPLACE_API_TOKEN" ]; then
            echo "⚠️  MARKETPLACE_API_TOKEN not set"
            echo "To register plugins, configure the following secret in your GitHub repository:"
            echo "  - MARKETPLACE_API_TOKEN: Your Claude Code marketplace API token"
            echo ""
            echo "Steps:"
            echo "1. Visit: https://claude.ai/code/marketplace/admin"
            echo "2. Generate an API token"
            echo "3. Add it as a GitHub secret: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

          echo "📤 Registering plugin with marketplace..."
          echo "   Plugin: flutter-dev-assistant"
          echo "   Version: ${PLUGIN_VERSION}"
          echo "   Marketplace: ${MARKETPLACE_URL}"

          PAYLOAD='{"pluginId":"flutter-dev-assistant","namespace":"andreimbro","version":"'"${PLUGIN_VERSION}"'","repository":"https://github.com/andreimbro/flutter-dev-assistant-claude","branch":"main","metadata":{"name":"flutter-dev-assistant","description":"Enterprise-grade AI development companion for Flutter with intelligent code analysis, widget optimization, state management guidance, security auditing, comprehensive verification, and multi-agent orchestration","owner":{"name":"andreimbro","email":"andreimbro@github.com"},"homepage":"https://github.com/andreimbro/flutter-dev-assistant-claude","license":"Apache-2.0","category":"mobile","tags":["flutter","dart","mobile","performance","optimization","ai-assistant","dev-tools","code-analysis"]}}'

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${MARKETPLACE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${MARKETPLACE_URL}/plugins")

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.success' > /dev/null 2>&1; then
            echo "✅ Plugin registered successfully!"
          else
            echo "⚠️  Plugin registration submitted (may require approval)"
          fi

      - name: Notify marketplace
        if: success()
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          echo "✅ Marketplace publication workflow completed!"
          echo ""
          echo "📋 Summary:"
          echo "  Plugin: flutter-dev-assistant"
          echo "  Version: ${VERSION}"
          echo "  Status: Ready in marketplace"
          echo ""
          echo "🔗 Next steps:"
          echo "  1. Verify the plugin appears in the marketplace"
          echo "  2. Update installation links if needed"
          echo "  3. Monitor for user feedback"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Marketplace publication failed"
          echo ""
          echo "⚠️  Please check:"
          echo "  1. MARKETPLACE_API_TOKEN secret is configured"
          echo "  2. marketplace.json metadata is valid"
          echo "  3. Version numbers match across all files"
