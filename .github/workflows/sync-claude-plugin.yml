name: Sync Claude Code Plugin

on:
  push:
    branches: [main]
    paths:
      - 'plugins/claude-code/**'

jobs:
  sync:
    name: Push subtree to flutter-dev-assistant-claude
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate plugin configuration
        working-directory: ./plugins/claude-code
        run: |
          echo "Validating plugin files..."
          if [ -f ".claude-plugin/plugin.json" ]; then
            jq empty .claude-plugin/plugin.json && echo "✅ plugin.json is valid" || exit 1
          fi
          if [ -f ".claude-plugin/marketplace.json" ]; then
            jq empty .claude-plugin/marketplace.json && echo "✅ marketplace.json is valid" || exit 1
          fi

      - name: Push subtree
        env:
          PAT_TOKEN: ${{ secrets.CLAUDE_REPO_PAT }}
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git subtree split --prefix=plugins/claude-code -b claude-subtree
          git push -f "https://x-access-token:${PAT_TOKEN}@github.com/andreimbro/flutter-dev-assistant-claude.git" claude-subtree:main
          echo "✅ Plugin synced to flutter-dev-assistant-claude"
